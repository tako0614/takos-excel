name: takos-excel
version: "0.1.0"

publish:
  - name: excel-ui
    type: takos.ui-surface.v1
    display:
      title: Excel
      description: Takos spreadsheet editor
      icon: /icons/excel.svg
      category: office
      sortOrder: 20
    outputs:
      url:
        kind: url
        routeRef: ui
  - name: excel-mcp
    type: takos.mcp-server.v1
    display:
      title: Excel MCP
    outputs:
      url:
        kind: url
        routeRef: mcp
    auth:
      bearer:
        secretRef: MCP_AUTH_TOKEN
    spec:
      transport: streamable-http
  - name: excel-file-handler
    type: takos.file-handler.v1
    display:
      title: Excel
      description: Open Takos spreadsheet files
    outputs:
      url:
        kind: url
        routeRef: file-open
    spec:
      mimeTypes:
        - application/vnd.takos.excel+json
      extensions:
        - .takossheet

compute:
  web:
    icon: /icons/excel.svg
    readiness: /healthz
    env:
      APP_AUTH_REQUIRED: "1"
    consume:
      - publication: takos.api-key
        as: takos-api
        request:
          scopes:
            - files:read
            - files:write
        env:
          endpoint: TAKOS_STORAGE_API_URL
          apiKey: TAKOS_STORAGE_ACCESS_TOKEN
      - publication: takos.oauth-client
        as: excel-oauth
        request:
          clientName: Takos Excel
          redirectUris:
            - /api/auth/callback
          scopes:
            - openid
            - profile
            - email
        env:
          clientId: OAUTH_CLIENT_ID
          clientSecret: OAUTH_CLIENT_SECRET
          issuer: OAUTH_ISSUER_URL
          tokenEndpoint: OAUTH_TOKEN_URL
          userinfoEndpoint: OAUTH_USERINFO_URL
    build:
      fromWorkflow:
        path: .takos/workflows/deploy.yml
        job: build-web
        artifact: web
        artifactPath: dist/worker.js

resources:
  excel-session-secret:
    type: secret
    generate: true
    bind: APP_SESSION_SECRET
    to: web

routes:
  - id: ui
    target: web
    path: /
  - id: api
    target: web
    path: /api
  - id: mcp
    target: web
    path: /mcp
  - id: file-open
    target: web
    path: /files/:id
