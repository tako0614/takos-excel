apiVersion: takos.dev/v1alpha1
kind: App
metadata:
  name: takos-excel
spec:
  version: "0.1.0"
  description: Spreadsheet editor (Google Sheets alternative)
  category: app
  tags:
    - excel
    - spreadsheet
    - editor
    - formula

  workers:
    web:
      build:
        fromWorkflow:
          path: .takos/workflows/deploy.yml
          job: build-web
          artifact: web
          artifactPath: dist

  routes:
    - name: web
      target: web
      path: /

  takos:
    scopes:
      - files:read
      - files:write

  env:
    required:
      - TAKOS_ACCESS_TOKEN
    inject:
      APP_URL: "{{routes.web.url}}"
      TAKOS_API_URL: "{{takos.apiUrl}}"

  mcpServers:
    takos-excel:
      command: deno
      args: ["task", "mcp"]
      cwd: "{{root}}"
      tools:
        - sheet_list
        - sheet_create
        - sheet_get
        - sheet_delete
        - sheet_set_title
        - sheet_add_tab
        - sheet_remove_tab
        - sheet_rename_tab
        - sheet_get_cell
        - sheet_set_cell
        - sheet_get_range
        - sheet_set_range
        - sheet_clear_range
        - sheet_format_cell
        - sheet_format_range
        - sheet_evaluate
        - sheet_get_computed
        - sheet_set_column_width
        - sheet_set_row_height
        - sheet_screenshot
        - sheet_export_csv
        - sheet_export_json
