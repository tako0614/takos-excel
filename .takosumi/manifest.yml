apiVersion: "1.0"
kind: Manifest
metadata:
  name: takos-excel
  labels:
    managed-by: takosumi-git
    takos.app: excel
resources:
  - shape: worker@v1
    name: excel-worker
    provider: "@takos/cloudflare-workers"
    spec:
      artifact:
        kind: js-bundle
        hash: sha256:pending
      compatibilityDate: "2025-01-01"
      routes:
        - /
        - /api
        - /mcp
        - /files/:id
      env:
        APP_AUTH_REQUIRED: "1"
        MCP_ALLOW_UNAUTHENTICATED: "0"
    workflowRef:
      file: build.yml
      job: build
      artifact: worker
      target: spec.artifact.hash
